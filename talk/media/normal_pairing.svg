  <!-- C -> A return arc (below) -->
  <path d="M560 122 L560 160 L120 160 L120 122" fill="none" stroke="var(--s)" stroke-width="1.5" marker-end="url(#arrow)" style="fill:none;stroke:rgb(194, 192, 182);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

